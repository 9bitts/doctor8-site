name: E2E

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: doctor8_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/doctor8_e2e
      AUTH_SECRET: ci-e2e-auth-secret-minimum-32-characters
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-e2e-auth-secret-minimum-32-characters
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      E2E_PATIENT_EMAIL: e2e-patient@doctor8.test
      E2E_PATIENT_PASSWORD: TestPassword1!
      E2E_PROFESSIONAL_EMAIL: e2e-volunteer@doctor8.test
      E2E_PROFESSIONAL_PASSWORD: TestPassword1!
      E2E_QUEUE_PATIENT_EMAIL: e2e-queue-patient@doctor8.test
      E2E_QUEUE_PATIENT_PASSWORD: TestPassword1!
      E2E_PSYCHOLOGIST_EMAIL: e2e-psychologist@doctor8.test
      E2E_PSYCHOLOGIST_PASSWORD: TestPassword1!
      ALLOW_E2E_SEED: "1"
      E2E_MOCK_DAILY: "1"
      # Optional — vapid endpoint returns enabled:false without these; set for push subscribe tests
      VAPID_PUBLIC_KEY: "BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3CBJi2-T09Fykw80j4Q"
      VAPID_PRIVATE_KEY: "UUxI4O8-FbRqjA5n51g3dM8sTbOqV1fK3yZ9xW2vN4c"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3CBJi2-T09Fykw80j4Q"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security lib checks
        run: npm run test:security-libs && npm run verify:api-roles

      - name: Sync database schema
        # Fresh CI DB has no baseline migration — db push matches schema.prisma (prod uses migrate deploy).
        run: npx prisma db push --accept-data-loss

      - name: Pharmacy dispense guard checks
        run: npm run test:pharmacy-dispense-guards

      - name: Seed E2E fixtures
        run: node scripts/seed-e2e.mjs

      - name: Check i18n keys
        run: npm run check:i18n

      - name: Build application
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
